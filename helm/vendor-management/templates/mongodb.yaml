apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-db
  labels:
    app: vendor-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vendor-db
  template:
    metadata:
      labels:
        app: vendor-db
    spec:
      containers:
        - name: mongodb
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vendor-db-service
spec:
  ports:
    - port: {{ .Values.mongodb.service.port }}
      targetPort: 27017
  selector:
    app: vendor-db
